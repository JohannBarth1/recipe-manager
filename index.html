<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home Kitchen — Recipe Book</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ... Keep all your existing CSS styles exactly as they are ... */
/* (I have omitted the CSS here for brevity, but keep your existing styles) */
</style>
</head>
<body>

<script>
// ... [Keep all your existing data and functions up to exportEpub] ...

// ══════════════════════════════════════════════════
// UPDATED EPUB EXPORT
// ══════════════════════════════════════════════════
async function exportEpub() {
  showToast('Building EPUB…');
  const zip = new JSZip();
  zip.file('mimetype', 'application/epub+zip', {compression:'STORE'});
  zip.file('META-INF/container.xml', `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:schemas:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);
  
  const css = `body{font-family:Georgia,serif;margin:2em;line-height:1.6}h1{font-size:2em;border-bottom:2px solid #333;padding-bottom:.3em;margin-top:1em}h2{font-size:1.5em;margin-top:2em;border-bottom:1px solid #aaa;padding-bottom:.2em}h3{font-size:1.2em;margin-top:1.5em}ul,ol{margin:.5em 0 .5em 1.5em}li{margin:.3em 0}.ing{background:#f9f9f9;border-left:3px solid #888;padding:.8em 1em;margin:1em 0}.tip{font-style:italic;color:#555;padding:.6em 1em;border:1px dashed #bbb;margin-top:1em}.intro{font-style:italic;color:#555;margin-bottom:1.5em}.recipe-page{page-break-after:always}`;
  zip.file('OEBPS/style/main.css', css);
  
  const x = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const wrap = (title, body) => `<?xml version="1.0" encoding="utf-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${x(title)}</title><link rel="stylesheet" type="text/css" href="style/main.css"/></head><body>${body}</body></html>`;
  
  const mf = [`<item id="css" href="style/main.css" media-type="text/css"/>`,`<item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>`,`<item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>`];
  const sp = [];
  const nc = [];
  const ni = [];
  let po = 1;

  for (const ch of data.chapters) {
    const rs = data.recipes.filter(r => r.chapterId === ch.id);
    
    // Create Chapter Index Page
    const chFname = `ch_${ch.id}.xhtml`;
    const chBody = `<h1>${x(ch.name)}</h1><ul>${rs.map(r=>`<li><a href="${r.id}.xhtml">${x(r.title)}</a></li>`).join('')}</ul>`;
    zip.file(`OEBPS/${chFname}`, wrap(ch.name, chBody));
    
    mf.push(`<item id="ch_${ch.id}" href="${chFname}" media-type="application/xhtml+xml"/>`);
    sp.push(`<itemref idref="ch_${ch.id}"/>`);
    
    let navPoints = ``;
    let navItems = ``;
    
    for (const r of rs) {
      const rFname = `${r.id}.xhtml`;
      let rBody = `<div class="recipe-page"><h1>${x(r.title)}</h1>`;
      if (r.desc) rBody += `<p class="intro">${x(r.desc)}</p>`;
      rBody += `<h3>Ingredients</h3><div class="ing"><ul>${r.ingredients.map(i=>`<li>${x(i)}</li>`).join('')}</ul></div>`;
      rBody += `<h3>Instructions</h3><ol>${r.steps.map(s=>`<li>${x(s)}</li>`).join('')}</ol>`;
      if (r.tip) rBody += `<div class="tip"><strong>Tip:</strong> ${x(r.tip)}</div></div>`;
      
      zip.file(`OEBPS/${rFname}`, wrap(r.title, rBody));
      mf.push(`<item id="${r.id}" href="${rFname}" media-type="application/xhtml+xml"/>`);
      sp.push(`<itemref idref="${r.id}"/>`);
      
      po++;
      navPoints += `<navPoint id="${r.id}" playOrder="${po}"><navLabel><text>${x(r.title)}</text></navLabel><content src="${rFname}"/></navPoint>`;
      navItems += `<li><a href="${rFname}">${x(r.title)}</a></li>`;
    }
    
    nc.push(`<navPoint id="ch_${ch.id}" playOrder="${po}"><navLabel><text>${x(ch.name)}</text></navLabel><content src="${chFname}"/>${navPoints}</navPoint>`);
    ni.push(`<li><a href="${chFname}">${x(ch.name)}</a><ol>${navItems}</ol></li>`);
  }

  zip.file('OEBPS/content.opf', `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="uid" version="3.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">home-kitchen-recipe-book</dc:identifier><dc:title>Home Kitchen Recipe Book</dc:title><dc:language>en</dc:language></metadata><manifest>${mf.join('')}</manifest><spine toc="ncx">${sp.join('')}</spine></package>`);
  zip.file('OEBPS/toc.ncx', `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="home-kitchen-recipe-book"/></head><docTitle><text>Home Kitchen Recipe Book</text></docTitle><navMap>${nc.join('')}</navMap></ncx>`);
  zip.file('OEBPS/nav.xhtml', `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>Contents</title></head><body><nav epub:type="toc"><h1>Contents</h1><ol>${ni.join('')}</ol></nav></body></html>`);
  
  const blob = await zip.generateAsync({type:'blob', mimeType:'application/epub+zip'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'Home_Kitchen_Recipe_Book.epub'; a.click();
  URL.revokeObjectURL(url);
  showToast('EPUB downloaded!');
}
</script>
</body>
</html>
